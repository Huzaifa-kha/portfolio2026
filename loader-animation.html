<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huzaifa Designs — Logo Animation</title>
<style>
  :root{ --purple:#6334F3; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    background:
      radial-gradient(120% 120% at 50% 42%, #ffffff 0%, #f3f0fb 46%, #e9e4f7 100%);
    overflow:hidden;
    font-family:system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center;
    -webkit-user-select:none; user-select:none;
  }
  .stage{ position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .glow{
    position:absolute; left:50%; top:46%; width:60vmin; height:60vmin;
    transform:translate(-50%,-50%) scale(.6);
    background:radial-gradient(circle, rgba(99,52,243,.22) 0%, rgba(99,52,243,0) 62%);
    filter:blur(8px); opacity:0; pointer-events:none;
  }
  .logo{ position:relative; width:856px; height:316px; transform-origin:center center; }
  .logo img{
    position:absolute; display:block; opacity:0;
    transform-origin:center center;
    -webkit-backface-visibility:hidden; backface-visibility:hidden;
  }

  /* ---- dark mode ---- */
  body.dark{
    background:
      radial-gradient(120% 120% at 50% 42%, #1b1633 0%, #100c20 52%, #07060e 100%);
  }
  body.dark .glow{ background:radial-gradient(circle, rgba(124,86,255,.34) 0%, rgba(124,86,255,0) 62%); }
  /* recolour the black calligraphy + wordmark to white so it reads on dark */
  body.dark .logo img.ink{ filter:invert(1); }
</style>
</head>

const BOX_W = 856, BOX_H = 316;

const MARK = [
  {name:'left_purple',  x:0,   y:35,  w:310, h:168},
  {name:'right_purple', x:543, y:35,  w:313, h:168},
  {name:'ring',         x:301, y:97,  w:106, h:106},
  {name:'dot_small',    x:297, y:67,  w:30,  h:30 },
  {name:'bar1',         x:365, y:37,  w:162, h:166},
  {name:'bar2',         x:428, y:37,  w:161, h:166},
  {name:'bar3',         x:489, y:37,  w:162, h:166},
  {name:'dot_top',      x:481, y:0,   w:30,  h:28 },
  {name:'dot_botL',     x:512, y:213, w:30,  h:28 },
  {name:'dot_botR',     x:548, y:213, w:30,  h:28 },
];
const LETTERS = [
  {name:'ltr_H', x:184,y:268,w:33,h:39},
  {name:'ltr_u', x:228,y:278,w:28,h:30},
  {name:'ltr_z', x:265,y:278,w:25,h:29},
  {name:'ltr_a1',x:296,y:278,w:29,h:30},
  {name:'ltr_i1',x:333,y:264,w:12,h:43},
  {name:'ltr_f', x:352,y:266,w:21,h:41},
  {name:'ltr_a2',x:379,y:278,w:29,h:30},
  {name:'ltr_D', x:435,y:268,w:35,h:39},
  {name:'ltr_e', x:478,y:277,w:32,h:31},
  {name:'ltr_s1',x:516,y:277,w:24,h:31},
  {name:'ltr_i2',x:548,y:264,w:12,h:43},
  {name:'ltr_g', x:568,y:277,w:31,h:39},
  {name:'ltr_n', x:610,y:277,w:29,h:30},
  {name:'ltr_s2',x:647,y:277,w:24,h:31},
];

const logo = document.getElementById('logo');
const els = {};
function place(item){
  const img = document.createElement('img');
  img.src = IMG[item.name];
  img.style.left = item.x + 'px';
  img.style.top  = item.y + 'px';
  img.style.width  = item.w + 'px';
  img.style.height = item.h + 'px';
  img.draggable = false;
  if(!PURPLE[item.name]) img.classList.add('ink');
  logo.appendChild(img);
  els[item.name] = img;
}
MARK.forEach(place);
LETTERS.forEach(place);

function fit(){
  const s = Math.min(window.innerWidth*0.82/BOX_W, window.innerHeight*0.66/BOX_H);
  logo.style.transform = 'scale(' + s + ')';
}
window.addEventListener('resize', fit); fit();

const BACK = 'cubic-bezier(.34,1.56,.64,1)';
const SOFT = 'cubic-bezier(.22,.61,.36,1)';
const tracked = [];
function anim(el, frames, opts){ const a = el.animate(frames, Object.assign({fill:'both'}, opts)); tracked.push(a); return a; }

function slideIn(el, delay, dx){
  anim(el, [
    {opacity:0, transform:'translateX('+dx+'px) scale(.62)'},
    {opacity:1, transform:'translateX(0) scale(1)'}
  ], {delay, duration:640, easing:BACK});
}
function spinIn(el, delay){
  anim(el, [
    {opacity:0, transform:'scale(0) rotate(-120deg)'},
    {opacity:1, transform:'scale(1) rotate(0deg)'}
  ], {delay, duration:680, easing:BACK});
}
function dropDot(el, delay){
  anim(el, [
    {opacity:0, transform:'translateY(-26px) scale(0)'},
    {offset:.7, opacity:1, transform:'translateY(2px) scale(1.05)'},
    {opacity:1, transform:'translateY(0) scale(1)'}
  ], {delay, duration:560, easing:SOFT});
}
function barIn(el, delay){
  anim(el, [
    {opacity:0, transform:'translateY(34px) scale(.4)'},
    {opacity:1, transform:'translateY(0) scale(1)'}
  ], {delay, duration:560, easing:BACK});
}
function typeIn(el, delay){
  anim(el, [
    {opacity:0, transform:'translateY(22px) scale(.4)'},
    {opacity:1, transform:'translateY(0) scale(1)'}
  ], {delay, duration:430, easing:BACK});
}

const CYCLE = 5200;
function playOnce(){
  tracked.splice(0).forEach(a=>a.cancel());
  slideIn(els.left_purple, 0, -70);
  slideIn(els.right_purple, 160, 70);
  spinIn(els.ring, 440);
  dropDot(els.dot_small, 600);
  barIn(els.bar1, 760);
  barIn(els.bar2, 860);
  barIn(els.bar3, 960);
  dropDot(els.dot_top, 1120);
  dropDot(els.dot_botL, 1250);
  dropDot(els.dot_botR, 1330);
  let t = 1620;
  LETTERS.forEach((l,i)=>{ if(i===7) t += 120; typeIn(els[l.name], t); t += 92; });
  anim(logo, [
    {transform:'scale(1)'}, {transform:'scale(1.025)'}, {transform:'scale(1)'}
  ], {delay:2300, duration:900, easing:SOFT, composite:'add'});
  const glow = document.getElementById('glow');
  glow.getAnimations().forEach(a=>a.cancel());
  glow.animate([
    {opacity:0, transform:'translate(-50%,-50%) scale(.55)'},
    {offset:.15, opacity:.5},
    {offset:.5,  opacity:.9, transform:'translate(-50%,-50%) scale(1)'},
    {opacity:0, transform:'translate(-50%,-50%) scale(1.15)'}
  ], {delay:300, duration:CYCLE-300, easing:'ease-in-out'});
}
playOnce();
// Notify parent window when the animation finishes so the loader can fade out
setTimeout(() => {
  // Fade the iframe body to black-transparent right before dismissing
  document.body.style.transition = 'opacity 0.6s ease';
  document.body.style.opacity = '0';
  try { window.parent.postMessage({ type: 'logo-animation-done' }, '*'); } catch (e) {}
}, CYCLE - 200);
</script>
